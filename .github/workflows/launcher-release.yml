name: Launcher Release

on:
  push:
    tags:
      - "app-v*.*.*"

permissions:
  contents: write

jobs:
  build-launcher:
    name: Build Electron Launcher
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            args: --linux
          - os: windows-latest
            platform: win
            args: --win

    defaults:
      run:
        working-directory: app/launcher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/launcher/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js + Electron
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.platform }}
          path: |
            app/launcher/release/*.AppImage
            app/launcher/release/*.deb
            app/launcher/release/*.exe
            app/launcher/release/latest*.yml
          if-no-files-found: warn

  attach-to-release:
    name: Attach to GitHub Release
    needs: build-launcher
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: launcher-artifacts/
          pattern: launcher-*
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          files: launcher-artifacts/*
