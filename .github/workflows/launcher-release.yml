name: Launcher Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-launcher:
    name: Build Electron Launcher
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            args: --mac --arm64
          - os: macos-latest
            platform: mac-x64
            args: --mac --x64
          - os: ubuntu-latest
            platform: linux
            args: --linux
          - os: windows-latest
            platform: win
            args: --win

    defaults:
      run:
        working-directory: app/launcher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/launcher/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js + Electron
        run: npm run build

      - name: Package and publish with electron-builder
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
