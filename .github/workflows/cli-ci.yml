name: CLI CI

on:
  push:
    branches: [main, Beta-opencern]
    paths:
      - "opencern-cli/**"
  pull_request:
    branches: [main]
    paths:
      - "opencern-cli/**"
  workflow_call:

defaults:
  run:
    working-directory: opencern-cli

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: opencern-cli/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencern-cli/package-lock.json
      - run: npm ci
      - run: npx eslint src/ || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencern-cli/package-lock.json
      - run: npm ci
      - run: npx tsc

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencern-cli/package-lock.json
      - run: npm ci
      - run: npm test
