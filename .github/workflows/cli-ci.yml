name: CLI CI

on:
  push:
    branches: [main, Beta-opencern]
    paths:
      - "opencern-cli/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "opencern-cli/**"
      - "scripts/**"
  workflow_call:

defaults:
  run:
    working-directory: opencern-cli

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx eslint src/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx vitest run --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: cli-coverage
          path: opencern-cli/coverage/

  # Test #24: Coverage threshold gate
  coverage-gate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Check coverage threshold
        run: |
          bunx vitest run --coverage --coverage.thresholds.lines=50 --coverage.thresholds.functions=40 --coverage.thresholds.branches=40 2>/dev/null || echo "::warning::Coverage below threshold — review test gaps"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: npm audit --audit-level=high || true

  # Test #19: Dependency license audit
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Check licenses
        run: |
          bunx license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0' --production 2>/dev/null || echo "::warning::License audit found issues — review dependencies"

  # Test #1: Shellcheck lint on install scripts
  shellcheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint scripts
        run: |
          shellcheck scripts/install.sh
          shellcheck scripts/install-w.sh
          shellcheck scripts/uninstall.sh

  # Test #3: Install script dry-run test
  install-script-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Start local HTTP server serving a fake binary
        run: |
          mkdir -p /tmp/fake-release
          echo '#!/bin/sh' > /tmp/fake-release/opencern-linux
          echo 'echo "opencern v0.0.0-test"' >> /tmp/fake-release/opencern-linux
          chmod +x /tmp/fake-release/opencern-linux
          cd /tmp/fake-release && python3 -m http.server 8199 &
          sleep 1
      - name: Test install script syntax parses
        run: sh -n scripts/install.sh
      - name: Test uninstall script syntax parses
        run: sh -n scripts/uninstall.sh

  # Test #14: CLI startup time benchmark
  startup-benchmark:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc
      - name: Measure startup time
        run: |
          START=$(date +%s%N)
          timeout 10 bun bin/opencern.js --version 2>/dev/null || true
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "CLI startup: ${ELAPSED}ms"
          if [ "$ELAPSED" -gt 5000 ]; then
            echo "::warning::CLI startup time ${ELAPSED}ms exceeds 5000ms threshold"
          fi
