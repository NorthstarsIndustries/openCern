# Test #25: Changelog enforcement — PRs must include a changelog entry or label
name: Changelog Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changelog or skip label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check if PR has the "skip-changelog" label
          LABELS=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "skip-changelog"; then
            echo "PR has 'skip-changelog' label — skipping check"
            exit 0
          fi

          # Check if any changelog-related file was modified
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1)
          if echo "$CHANGED" | grep -qiE '(CHANGELOG|CHANGES|HISTORY|RELEASE_NOTES)'; then
            echo "Changelog file updated — check passed"
            exit 0
          fi

          # Check if commit messages contain conventional commit types
          COMMITS=$(git log --oneline origin/main...HEAD 2>/dev/null || git log --oneline -5)
          if echo "$COMMITS" | grep -qE '^[a-f0-9]+ (feat|fix|docs|chore|refactor|perf|test|ci|build)(\(.+\))?:'; then
            echo "Conventional commits detected — changelog can be auto-generated"
            exit 0
          fi

          echo "::warning::No changelog entry found. Add a CHANGELOG.md update, use conventional commits, or add the 'skip-changelog' label."
