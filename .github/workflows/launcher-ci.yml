name: Launcher CI

on:
  push:
    branches: [main]
    paths:
      - "app/launcher/**"
  pull_request:
    branches: [main]
    paths:
      - "app/launcher/**"
  workflow_call:

defaults:
  run:
    working-directory: app/launcher

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/launcher/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/launcher/package-lock.json
      - run: npm ci
      - run: npx next build
