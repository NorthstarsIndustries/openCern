name: macOS Launcher Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac-launcher:
    name: Build Native macOS Launcher
    runs-on: macos-latest

    defaults:
      run:
        working-directory: app/launcher-mac

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy splash video to resources
        run: cp ../launcher/public/collision.mp4 OpenCERN/Resources/collision.mp4

      - name: Resolve SPM dependencies
        run: swift package resolve

      - name: Build release archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          if [ -n "$APPLE_TEAM_ID" ]; then
            SIGN_ARGS="CODE_SIGN_IDENTITY=$APPLE_DEVELOPER_ID DEVELOPMENT_TEAM=$APPLE_TEAM_ID OTHER_CODE_SIGN_FLAGS=--timestamp"
          else
            SIGN_ARGS="CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO"
          fi

          xcodebuild archive \
            -scheme OpenCERN \
            -configuration Release \
            -archivePath build/OpenCERN.xcarchive \
            -destination "generic/platform=macOS" \
            $SIGN_ARGS

      - name: Export archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_TEAM_ID" ]; then
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>method</key>\n  <string>developer-id</string>\n  <key>teamID</key>\n  <string>%s</string>\n</dict>\n</plist>\n' "$APPLE_TEAM_ID" > ExportOptions.plist

            xcodebuild -exportArchive \
              -archivePath build/OpenCERN.xcarchive \
              -exportPath build/export \
              -exportOptionsPlist ExportOptions.plist
          else
            mkdir -p build/export
            cp -R build/OpenCERN.xcarchive/Products/Applications/OpenCERN.app build/export/
          fi

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/export/OpenCERN.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "OpenCERN" -srcfolder build/dmg -ov -format UDZO build/OpenCERN-macOS.dmg

      - name: Notarize DMG
        if: env.APPLE_TEAM_ID != ''
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit build/OpenCERN-macOS.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple build/OpenCERN-macOS.dmg

      - name: Generate Sparkle appcast
        if: env.SPARKLE_ED_KEY != ''
        env:
          SPARKLE_ED_KEY: ${{ secrets.SPARKLE_ED_KEY }}
        run: |
          SPARKLE_BIN=$(swift package --package-path . show-dependencies --format json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('path',''))" 2>/dev/null || echo "")
          if [ -n "$SPARKLE_BIN" ] && [ -f "$SPARKLE_BIN/bin/generate_appcast" ]; then
            "$SPARKLE_BIN/bin/generate_appcast" \
              --ed-key-file <(echo "$SPARKLE_ED_KEY") \
              build/
          else
            echo "Sparkle generate_appcast not found, skipping appcast generation"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-mac-native
          path: |
            app/launcher-mac/build/OpenCERN-macOS.dmg
            app/launcher-mac/build/appcast.xml
          if-no-files-found: warn

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          files: |
            app/launcher-mac/build/OpenCERN-macOS.dmg
            app/launcher-mac/build/appcast.xml
