# Tests #12, #13: Playwright E2E tests for launcher and web UI
name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:

jobs:
  # Test #12: Launcher E2E (Playwright)
  launcher-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/launcher/package-lock.json

      - name: Install dependencies
        working-directory: app/launcher
        run: npm ci

      - name: Install Playwright
        working-directory: app/launcher
        run: npx playwright install --with-deps chromium 2>/dev/null || echo "Playwright not configured yet"

      - name: Build
        working-directory: app/launcher
        run: npx next build 2>/dev/null || true

      - name: Run Playwright tests
        working-directory: app/launcher
        run: |
          if [ -f "playwright.config.ts" ] || [ -f "playwright.config.js" ]; then
            npx playwright test
          else
            echo "::notice::No Playwright config found — skipping launcher E2E (add playwright.config.ts to enable)"
          fi

  # Test #13: Web UI E2E (Playwright)
  web-ui-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/next-ui/package-lock.json

      - name: Install dependencies
        working-directory: app/next-ui
        run: npm ci

      - name: Install Playwright
        working-directory: app/next-ui
        run: npx playwright install --with-deps chromium 2>/dev/null || echo "Playwright not configured yet"

      - name: Build
        working-directory: app/next-ui
        run: npm run build

      - name: Run Playwright tests
        working-directory: app/next-ui
        run: |
          if [ -f "playwright.config.ts" ] || [ -f "playwright.config.js" ]; then
            npx playwright test
          else
            echo "::notice::No Playwright config found — skipping web UI E2E (add playwright.config.ts to enable)"
          fi
