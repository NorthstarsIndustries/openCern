name: Docker Publish (autotest)

on:
  push:
    branches: [main]
    paths:
      - "containers/**"
      - "opencern-cli/quantum/**"
      - "app/next-ui/**"
      - "docker-compose.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  test-containers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            working-directory: containers/api
            command: python -m pytest tests/ -v
          - name: xrootd
            working-directory: containers/xrootd
            command: python -m pytest tests/ -v
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.command }}

  build-and-push:
    needs: test-containers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            context: .
            dockerfile: containers/api/Dockerfile
          - name: xrootd
            context: containers/xrootd
            dockerfile: containers/xrootd/Dockerfile
          - name: streamer
            context: containers/streaming
            dockerfile: containers/streaming/Dockerfile
          - name: quantum
            context: opencern-cli/quantum
            dockerfile: opencern-cli/quantum/Dockerfile
          - name: ui
            context: app/next-ui
            dockerfile: app/next-ui/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
