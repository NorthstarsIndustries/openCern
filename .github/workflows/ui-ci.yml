name: UI CI

on:
  push:
    branches: [main]
    paths:
      - "app/next-ui/**"
  pull_request:
    branches: [main]
    paths:
      - "app/next-ui/**"
  workflow_call:

defaults:
  run:
    working-directory: app/next-ui

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/next-ui/package-lock.json
      - run: npm ci
      - run: npx eslint . || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/next-ui/package-lock.json
      - run: npm ci
      - run: npm run build
