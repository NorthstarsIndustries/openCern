# Test #10: Docker Compose full stack smoke test
name: Compose Smoke Test

on:
  push:
    branches: [main]
    paths:
      - "containers/**"
      - "docker-compose.yml"
  pull_request:
    branches: [main]
    paths:
      - "containers/**"
      - "docker-compose.yml"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create required directories
        run: |
          mkdir -p ~/opencern-datasets/data
          mkdir -p ~/opencern-datasets/processed

      - name: Start services
        run: docker compose up -d --wait --timeout 120
        env:
          HOME: ${{ github.workspace }}
        continue-on-error: true

      - name: Check service health
        run: |
          FAILED=0
          for svc in api xrootd; do
            if docker compose ps --format json | grep -q "\"$svc\".*\"running\""; then
              echo "[OK] $svc is running"
            else
              echo "[FAIL] $svc is not healthy"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::warning::Some services failed to start — check container logs"
            docker compose logs --tail=50
          fi

      - name: Test API healthcheck
        run: |
          curl --retry 5 --retry-delay 3 --retry-connrefused -f http://127.0.0.1:8080/health || echo "::warning::API healthcheck failed"

      - name: Test port conflicts
        run: |
          for port in 3000 8080 8081 9001 9002 8082; do
            COUNT=$(ss -tln | grep -c ":${port} " || true)
            if [ "$COUNT" -gt 1 ]; then
              echo "::error::Port conflict on $port"
              exit 1
            fi
          done
          echo "No port conflicts detected"

      - name: Teardown
        if: always()
        run: docker compose down -v 2>/dev/null || true
