name: OpenCERN
options:
  bundleIdPrefix: co.northstarcorp.opencern
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  OpenCERN:
    type: application
    platform: macOS
    sources:
      - path: OpenCERN
        excludes:
          - "Resources/**"
    resources:
      - path: OpenCERN/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.northstarcorp.opencern.launcher
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OpenCERN/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenCERN/OpenCERN.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
    dependencies:
      - package: Sparkle
