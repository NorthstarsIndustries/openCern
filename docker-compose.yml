services:
  api:
    image: ghcr.io/ceoatnorthstar/api:latest
    container_name: opencern-api
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${HOME}/opencern-datasets:/home/appuser/opencern-datasets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  xrootd:
    image: ghcr.io/ceoatnorthstar/xrootd:latest
    container_name: opencern-xrootd
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ${HOME}/opencern-datasets:/home/appuser/opencern-datasets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  streamer:
    image: ghcr.io/ceoatnorthstar/streamer:latest
    container_name: opencern-streamer
    ports:
      - "127.0.0.1:9001:9001"
      - "127.0.0.1:9002:9002"
    volumes:
      - ${HOME}/opencern-datasets/processed:/home/appuser/opencern-datasets/processed:ro
    restart: unless-stopped

  quantum:
    image: ghcr.io/ceoatnorthstar/quantum:latest
    container_name: opencern-quantum
    ports:
      - "127.0.0.1:8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

